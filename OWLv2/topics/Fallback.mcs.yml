mcs.metadata:
  componentName: Fallback
  description: This system topic triggers when the user's utterance does not match any existing topics.
kind: AdaptiveDialog
beginDialog:
  kind: OnUnknownIntent
  id: main
  actions:
    - kind: ConditionGroup
      id: conditionGroup_LktzXw
      conditions:
        - id: conditionItem_tlGIVo
          condition: =System.FallbackCount < 3
          actions:
            - kind: SendActivity
              id: sendMessage_QZreqo
              activity: I do not have enough grounding to answer confidently yet. Please try rephrasing with product area, exact error text, and what you are trying to do.

      elseActions:
        - kind: BeginDialog
          id: 5aXj5M
          dialog: rmas_owlv2.topic.Escalate