mcs.metadata:
  componentName: Conversational boosting
  description: Primary retrieval topic. Searches official knowledge articles and channel memory to create grounded answers. Offers escalation when grounding is weak.
kind: AdaptiveDialog
beginDialog:
  kind: OnUnknownIntent
  id: main
  priority: -1
  actions:
    - kind: SearchAndSummarizeContent
      id: search-content
      variable: Topic.Answer
      userInput: =System.Activity.Text

    - kind: ConditionGroup
      id: has-answer-conditions
      conditions:
        - id: has-answer
          condition: =!IsBlank(Topic.Answer)
          actions:
            - kind: EndDialog
              id: end-topic
              clearTopicQueue: true

      elseActions:
        - kind: SendActivity
          id: sendMessage_lowConfidence
          activity: |-
            I could not find strong grounding for that question.

            **Confidence:** Low

            **Next step:** I can try again if you share more detail such as product area, exact error text, or what you are trying to do. I can also route this for manual follow-up.

        - kind: Question
          id: question_offerEscalation
          variable: init:Topic.RequestEscalation
          prompt: Would you like me to route this to escalation?
          entity: BooleanPrebuiltEntity

        - kind: ConditionGroup
          id: conditionGroup_routeEscalation
          conditions:
            - id: conditionItem_routeEscalation_yes
              condition: =Topic.RequestEscalation = true
              actions:
                - kind: BeginDialog
                  id: beginDialog_escalate
                  dialog: rmas_owlv2.topic.Escalate

          elseActions:
            - kind: SendActivity
              id: sendMessage_tryAgain
              activity: No problem. Try rephrasing your question with more detail and I will search again.

            - kind: EndDialog
              id: endDialog_noEscalation
              clearTopicQueue: true
