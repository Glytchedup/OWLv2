mcs.metadata:
  componentName: Thank you
  description: Triggered when the user says thank you. Acknowledges and offers continued help.
kind: AdaptiveDialog
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    displayName: Thank you
    includeInOnSelectIntent: false
    triggerQueries:
      - thanks
      - thank you
      - thanks so much
      - ty

  actions:
    - kind: SendActivity
      id: sendMessage_9iz6v7
      activity: You're welcome. Let me know if there is anything else I can help with.
