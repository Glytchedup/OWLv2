mcs.metadata:
  componentName: End of Conversation
  description: Triggered by redirect. Guides the user through rating their experience, offers feedback submission, and provides continuation or escalation options.
kind: AdaptiveDialog
startBehavior: CancelOtherTopics
beginDialog:
  kind: OnSystemRedirect
  id: main
  actions:
    - kind: Question
      id: 41d42054-d4cb-4e90-b922-2b16b37fe379
      conversationOutcome: ResolvedImplied
      alwaysPrompt: true
      variable: init:Topic.SurveyResponse
      prompt: Did that answer your question?
      entity: BooleanPrebuiltEntity

    - kind: ConditionGroup
      id: condition-0
      conditions:
        - id: condition-0-item-0
          condition: =Topic.SurveyResponse = true
          actions:
            - kind: CSATQuestion
              id: csat_1
              conversationOutcome: ResolvedConfirmed

            - kind: SendActivity
              id: sendMessage_8r29O0
              activity: Thanks for your feedback.

            - kind: Question
              id: question_1
              alwaysPrompt: true
              variable: init:Topic.Continue
              prompt: Can I help with anything else?
              entity: BooleanPrebuiltEntity

            - kind: ConditionGroup
              id: condition-1
              conditions:
                - id: condition-1-item-0
                  condition: =Topic.Continue = true
                  actions:
                    - kind: SendActivity
                      id: sendMessage_4eOE6h
                      activity: Go ahead. I'm listening.

              elseActions:
                - kind: SendActivity
                  id: yHBz55
                  activity: Ok, goodbye.

                - kind: EndConversation
                  id: jh1GMT

      elseActions:
        - kind: Question
          id: PM68ot
          alwaysPrompt: true
          variable: init:Topic.TryAgain
          prompt: I'm sorry about that. Would you like to try rephrasing your question so I can search again?
          entity: BooleanPrebuiltEntity

        - kind: ConditionGroup
          id: KNxYBf
          conditions:
            - id: DPveFP
              condition: =Topic.TryAgain = false
              actions:
                - kind: Question
                  id: question_offerFeedback
                  alwaysPrompt: true
                  variable: init:Topic.OfferFeedback
                  prompt: Would you like to submit feedback so we can improve? Your input will be recorded and reviewed by the team.
                  entity: BooleanPrebuiltEntity

                - kind: ConditionGroup
                  id: conditionGroup_offerFeedback
                  conditions:
                    - id: conditionItem_offerFeedback_yes
                      condition: =Topic.OfferFeedback = true
                      actions:
                        - kind: SendActivity
                          id: sendMessage_feedbackAck
                          activity: Thank you. Your feedback has been noted and will be reviewed. Please also include this context in a support ticket if this issue is blocking your work.

                - kind: BeginDialog
                  id: cngqi4
                  dialog: rmas_owlv2.topic.Escalate

          elseActions:
            - kind: SendActivity
              id: GrVHEW
              activity: Go ahead. I'm listening.
