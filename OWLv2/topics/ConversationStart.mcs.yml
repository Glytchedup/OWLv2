mcs.metadata:
  componentName: Conversation Start
  description: Triggers when the agent receives a new conversation. Introduces the agent, sets expectations about grounding sources, and offers suggested starter questions.
kind: AdaptiveDialog
beginDialog:
  kind: OnConversationStart
  id: main
  actions:
    - kind: SendActivity
      id: sendMessage_M0LuhV
      activity:
        text:
          - |-
            Hello, I'm {System.Bot.Name}. I help answer operational questions using two sources:

            - **Official knowledge articles** from our curated knowledge base
            - **Prior channel discussion** including resolved issues and thread summaries

            Here are some things you can ask me:
            - "What is the official process for this?"
            - "Has this issue come up before in this channel?"
            - "What did the team do last time this happened?"
            - "Do the documented steps match what the channel has been doing?"

            How can I help?
        speak:
          - Hello and thank you for reaching {System.Bot.Name}. I can help you find official guidance and check prior channel discussions. Some responses use AI and may need verification. How may I help you today?
